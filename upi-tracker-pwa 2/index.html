<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A0A0F" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="UPI Tracker" />
  <title>UPI Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0A0F;
      --card: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --purple: #7C3AED;
      --purple-light: #a78bfa;
      --red: #fca5a5;
      --green: #86efac;
      --yellow: #fde68a;
      --text: #ffffff;
      --text2: #888888;
      --text3: #555555;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; touch-action: pan-y; }
    ::-webkit-scrollbar { display: none; }
    #app { height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }
    .screen { flex: 1; overflow-y: scroll; -webkit-overflow-scrolling: touch; padding: 24px 16px 100px; animation: fadeUp 0.22s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* Cards */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; }

    /* Buttons */
    .btn { border: none; border-radius: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.18s; padding: 14px; font-size: 15px; width: 100%; }
    .btn:active { transform: scale(0.97); opacity: 0.9; }
    .btn-primary { background: linear-gradient(135deg, #7C3AED, #4F46E5); color: white; }
    .btn-amber { background: linear-gradient(135deg, #d97706, #b45309); color: white; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
    .btn-sm { padding: 8px 14px; font-size: 13px; width: auto; border-radius: 10px; }

    /* Inputs */
    input, textarea, select {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      padding: 11px 14px;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--purple); }
    select option { background: #1a1a2e; }
    textarea { resize: none; line-height: 1.6; }

    /* Nav */
    #nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: rgba(10,10,15,0.97); backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-around;
      padding: 10px 4px 20px; z-index: 100;
    }
    .nav-btn {
      background: none; border: none; color: #555; cursor: pointer;
      font-family: inherit; display: flex; flex-direction: column;
      align-items: center; gap: 3px; font-size: 10px; padding: 4px 10px;
      transition: color 0.2s; min-width: 56px;
    }
    .nav-btn .icon { font-size: 22px; line-height: 1; }
    .nav-btn.active { color: var(--purple); }

    /* Misc */
    .badge { border-radius: 20px; font-size: 11px; font-weight: 600; padding: 2px 8px; display: inline-block; }
    .progress-bar { background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
    .row { display: flex; align-items: center; justify-content: space-between; }
    .gap8 { gap: 8px; display: flex; align-items: center; }
    .label { font-size: 12px; color: var(--text2); font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field { margin-bottom: 14px; }
    .page-title { font-size: 22px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
    .sub { font-size: 11px; color: var(--text2); font-weight: 500; margin-bottom: 2px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .big-num { font-size: 20px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
    .section-title { font-size: 13px; font-weight: 600; color: #ccc; margin-bottom: 14px; }
    .empty { text-align: center; padding: 50px 20px; color: #444; }
    .empty .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      border-radius: 12px; padding: 10px 20px; z-index: 9999;
      font-size: 13px; font-weight: 600; white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: slideDown 0.3s ease; pointer-events: none;
    }
    @keyframes slideDown { from { opacity:0; transform:translateX(-50%) translateY(-10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    .toast.success { background: #1a2e1a; border: 1px solid #22c55e; color: #86efac; }
    .toast.warn { background: #2e1a0a; border: 1px solid #f59e0b; color: #fbbf24; }
    .toast.error { background: #2e0a0a; border: 1px solid #ef4444; color: #fca5a5; }
    .tab-switch { display: flex; background: rgba(255,255,255,0.05); border-radius: 14px; padding: 4px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; background: transparent; color: #888; font-weight: 600; font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .tab-btn.active { background: rgba(124,58,237,0.6); color: white; }
    .type-btn { flex: 1; padding: 11px; border-radius: 10px; border: 1px solid var(--border); background: transparent; font-weight: 600; font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.2s; color: #888; }
    .type-btn.debit.active { border-color: #ef4444; background: rgba(239,68,68,0.15); color: #fca5a5; }
    .type-btn.credit.active { border-color: #22c55e; background: rgba(34,197,94,0.15); color: #86efac; }
    .filter-btn { white-space: nowrap; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: #888; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .filter-btn.active { border-color: var(--purple); background: rgba(124,58,237,0.3); color: var(--purple-light); }
    .txn-card { padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
    .txn-icon { width: 44px; height: 44px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .del-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 16px; padding: 4px; }
    .alert-card { border-radius: 12px; padding: 10px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
    .parsed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .parsed-cell { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 9px 12px; }
    .parsed-cell .k { font-size: 10px; color: #666; margin-bottom: 3px; }
    .parsed-cell .v { font-size: 13px; font-weight: 600; color: #e5e5e5; }
    .scope-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: 600; font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .scope-btn.active { background: rgba(124,58,237,0.6); color: white; }
    .scope-btn:not(.active) { background: transparent; color: #888; }
  </style>
</head>
<body>
<div id="app">
  <div id="screen-container"></div>
  <nav id="nav">
    <button class="nav-btn active" data-screen="dashboard" onclick="navigate('dashboard')">
      <span class="icon">📊</span>Home
    </button>
    <button class="nav-btn" data-screen="add" onclick="navigate('add')">
      <span class="icon">➕</span>Add
    </button>
    <button class="nav-btn" data-screen="cashback" onclick="navigate('cashback')">
      <span class="icon">🎁</span>Cashback
    </button>
    <button class="nav-btn" data-screen="budget" onclick="navigate('budget')">
      <span class="icon">🎯</span>Budget
    </button>
    <button class="nav-btn" data-screen="settings" onclick="navigate('settings')">
      <span class="icon">⚙️</span>More
    </button>
  </nav>
  <div id="toast-container"></div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────
const CATEGORIES = ["Food","Transport","Shopping","Bills","Medical","Entertainment","Groceries","Rent","Investment","Other"];
const CAT_ICONS = {Food:"🍔",Transport:"🚗",Shopping:"🛍️",Bills:"💡",Medical:"💊",Entertainment:"🎬",Groceries:"🛒",Rent:"🏠",Investment:"📈",Other:"💸"};
const CAT_COLORS = {Food:"#FF6B6B",Transport:"#4ECDC4",Shopping:"#FFE66D",Bills:"#A8E6CF",Medical:"#FF8B94",Entertainment:"#B8B8FF",Groceries:"#FFDAC1",Rent:"#E2F0CB",Investment:"#C7CEEA",Other:"#F0E6FF"};
const CB_SOURCES = ["GPay","PhonePe","Paytm","Amazon Pay","HDFC Card","SBI Card","ICICI Card","Axis Card","Kotak Card","Flipkart","Swiggy","Zomato","Other"];

let state = {
  screen: 'dashboard',
  transactions: JSON.parse(localStorage.getItem('upi_txns') || '[]'),
  cashbacks: JSON.parse(localStorage.getItem('upi_cbs') || '[]'),
  budgets: JSON.parse(localStorage.getItem('upi_budgets') || '{}'),
  sheetsUrl: localStorage.getItem('sheets_url') || '',
  activeMonth: getMonth(new Date()),
  addMode: 'upi',
  addCashType: 'debit',
  parsed: null,
  parsing: false,
  saving: false,
  cbScope: 'global',
  budgetScope: 'global',
  txnFilter: 'all',
  cbFilter: 'all',
  editBudgetCat: null,
  showSheetsGuide: false,
  upiMsg: '',
  cashAmount: '', cashMerchant: '', cashCategory: 'Other', cashNote: '', cashUpiNote: '', cashCategory2: 'Other',
  cbAmount: '', cbSource: 'GPay', cbCustomSource: '', cbNote: '', showCbForm: false,
  budgetEditVal: '',
  sheetsInput: localStorage.getItem('sheets_url') || '',
  txnSearch: '',
};

function save() {
  localStorage.setItem('upi_txns', JSON.stringify(state.transactions));
  localStorage.setItem('upi_cbs', JSON.stringify(state.cashbacks));
  localStorage.setItem('upi_budgets', JSON.stringify(state.budgets));
}

function getMonth(d) {
  const dt = new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
}
function monthLabel(m) {
  const [y,mo] = m.split('-');
  return new Date(y, mo-1).toLocaleString('default',{month:'short',year:'numeric'});
}
function fmt(n) {
  return '₹' + Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2});
}
function getAllMonths() {
  const s = new Set([...state.transactions.map(t=>getMonth(t.createdAt)), ...state.cashbacks.map(c=>getMonth(c.createdAt))]);
  const arr = [...s].sort().reverse();
  return arr.length > 0 ? arr : [state.activeMonth];
}

// ─── TOAST ───────────────────────────────────────────────
function showToast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ─── NAVIGATE ────────────────────────────────────────────
function navigate(screen) {
  state.screen = screen;
  state.parsed = null;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.screen === screen);
  });
  render();
}

// ─── AI PARSE ────────────────────────────────────────────
async function parseUPI() {
  const msg = state.upiMsg.trim();
  if (!msg) { showToast('Please paste a bank SMS first', 'warn'); return; }
  const apiKey = localStorage.getItem('anthropic_key');
  if (!apiKey) { showToast('⚠️ Please save your API key in Settings first', 'warn'); return; }
  state.parsing = true; render();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        messages: [{ role:'user', content:`Parse this bank/UPI SMS. Return ONLY valid JSON, no markdown.
SMS: "${msg}"
Return: {"amount":number,"type":"debit" or "credit","merchant":"string or null","bank":"string","date":"DD/MM/YYYY or null","refNo":"string or null","balance":number or null,"suggestedCategory":"one of ${CATEGORIES.join(',')}","isCashback":boolean}
isCashback=true if cashback/reward/refund. If not a transaction return {"error":"not a transaction"}` }]
      })
    });
    if (!res.ok) {
      const err = await res.json();
      showToast('❌ API Error: ' + (err.error?.message || res.status), 'error');
      state.parsing = false; render(); return;
    }
    const data = await res.json();
    const text = (data.content?.[0]?.text || '{}').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);
    if (parsed.error) { showToast('❌ ' + parsed.error, 'error'); state.parsed = null; }
    else {
      state.parsed = {
        amount: parsed.amount || parsed.Amount || 0,
        type: parsed.type || parsed.Type || 'debit',
        merchant: parsed.merchant || parsed.Merchant || null,
        bank: parsed.bank || parsed.Bank || null,
        date: parsed.date || parsed.Date || null,
        refNo: parsed.refNo || parsed.RRN || parsed.rrn || null,
        balance: parsed.balance || parsed.Balance || null,
        isCashback: parsed.isCashback || false,
        category: parsed.suggestedCategory || parsed.category || 'Other',
        note: ''
      };
      showToast('✅ Parsed!');
    }
  } catch(e) { showToast('❌ Failed: ' + e.message, 'error'); }
  state.parsing = false; render();
}

// ─── ADD TRANSACTION ────────────────────────────────────
async function saveUPITxn() {
  if (!state.parsed || state.saving) return;
  state.saving = true; render();
  const txn = { ...state.parsed, id: Date.now().toString(), createdAt: new Date().toISOString(), source: 'upi' };
  delete txn.suggestedCategory;
  state.transactions.unshift(txn);
  save();
  await syncToSheets(txn);
  state.upiMsg = ''; state.parsed = null; state.saving = false;
  showToast('✅ Transaction saved!');
  navigate('dashboard');
}

async function saveCashTxn() {
  if (!state.cashAmount || state.saving) return;
  state.saving = true; render();
  const txn = {
    id: Date.now().toString(), createdAt: new Date().toISOString(),
    amount: parseFloat(state.cashAmount), type: state.addCashType,
    merchant: state.cashMerchant || 'Cash', category: state.cashCategory,
    note: state.cashNote, source: 'cash', bank: 'Cash'
  };
  state.transactions.unshift(txn);
  save();
  await syncToSheets(txn);
  state.cashAmount = ''; state.cashMerchant = ''; state.cashNote = '';
  state.cashCategory = 'Other'; state.saving = false;
  showToast('✅ Transaction saved!');
  navigate('dashboard');
}

async function syncToSheets(txn) {
  if (!state.sheetsUrl) return;
  try {
    await fetch(state.sheetsUrl, { method:'POST', mode:'no-cors', body: JSON.stringify({ date: new Date().toLocaleDateString('en-IN'), amount: txn.amount, category: txn.category }) });
    showToast('📊 Synced to Sheets!');
  } catch { showToast('⚠️ Sheets sync failed', 'warn'); }
}

function deleteTxn(id) {
  if (!confirm('Delete this transaction?')) return;
  state.transactions = state.transactions.filter(t => t.id !== id);
  save(); render(); showToast('🗑️ Deleted');
}

// ─── CASHBACK ────────────────────────────────────────────
function saveCashback() {
  if (!state.cbAmount) return;
  const cb = {
    id: Date.now().toString(), createdAt: new Date().toISOString(),
    amount: parseFloat(state.cbAmount),
    source: state.cbSource === 'Other' ? (state.cbCustomSource || 'Other') : state.cbSource,
    note: state.cbNote
  };
  state.cashbacks.unshift(cb);
  save();
  state.cbAmount = ''; state.cbNote = ''; state.cbCustomSource = ''; state.showCbForm = false;
  render(); showToast('🎉 Cashback recorded!');
}
function deleteCb(id) {
  if (!confirm('Delete this cashback?')) return;
  state.cashbacks = state.cashbacks.filter(c => c.id !== id);
  save(); render(); showToast('🗑️ Deleted');
}

// ─── BUDGET ──────────────────────────────────────────────
function saveBudget(cat) {
  const val = parseFloat(state.budgetEditVal);
  if (!val) return;
  const key = state.budgetScope === 'month' ? `${state.activeMonth}_${cat}` : cat;
  state.budgets[key] = val;
  save(); state.editBudgetCat = null; render();
}
function removeBudget(cat) {
  const key = state.budgetScope === 'month' ? `${state.activeMonth}_${cat}` : cat;
  delete state.budgets[key];
  save(); render();
}
function getBudget(cat) {
  return state.budgets[`${state.activeMonth}_${cat}`] || state.budgets[cat];
}

// ─── RENDER HELPERS ──────────────────────────────────────
function monthSelect(val, onchange) {
  const months = getAllMonths();
  return `<select style="padding:6px 12px;font-size:13px;color:#ccc;" onchange="${onchange}">
    ${months.map(m => `<option value="${m}" ${m===val?'selected':''}>${monthLabel(m)}</option>`).join('')}
  </select>`;
}

// ─── SCREENS ─────────────────────────────────────────────

function renderDashboard() {
  const months = getAllMonths();
  if (!months.includes(state.activeMonth)) state.activeMonth = months[0];
  const txns = state.transactions.filter(t => getMonth(t.createdAt) === state.activeMonth);
  const cbs = state.cashbacks.filter(c => getMonth(c.createdAt) === state.activeMonth);
  const spent = txns.filter(t=>t.type==='debit').reduce((a,t)=>a+t.amount,0);
  const received = txns.filter(t=>t.type==='credit').reduce((a,t)=>a+t.amount,0);
  const cbTotal = cbs.reduce((a,c)=>a+c.amount,0);
  const net = received - spent + cbTotal;

  const catBreak = CATEGORIES.map(c=>({c,a:txns.filter(t=>t.category===c&&t.type==='debit').reduce((s,t)=>s+t.amount,0)})).filter(x=>x.a>0).sort((a,b)=>b.a-a.a);
  const alerts = CATEGORIES.map(c=>{
    const s=txns.filter(t=>t.category===c&&t.type==='debit').reduce((a,t)=>a+t.amount,0);
    const b=getBudget(c); return b&&s>b*0.8?{c,s,b,pct:Math.round(s/b*100)}:null;
  }).filter(Boolean);

  return `
  <div class="screen">
    <div class="row" style="margin-bottom:20px">
      <div><div class="sub">OVERVIEW</div><div class="page-title">Dashboard</div></div>
      ${monthSelect(state.activeMonth, "state.activeMonth=this.value;render()")}
    </div>

    ${alerts.map(a=>`
    <div class="alert-card" style="background:${a.pct>=100?'rgba(239,68,68,0.15)':'rgba(234,179,8,0.12)'};border:1px solid ${a.pct>=100?'rgba(239,68,68,0.4)':'rgba(234,179,8,0.3)'}">
      <span style="font-size:20px">${a.pct>=100?'🚨':'⚠️'}</span>
      <div>
        <div style="font-size:13px;font-weight:600;color:${a.pct>=100?'#fca5a5':'#fde68a'}">${a.c} budget ${a.pct>=100?'exceeded':'near limit'}</div>
        <div style="font-size:11px;color:#888;margin-top:2px">${fmt(a.s)} / ${fmt(a.b)} (${a.pct}%)</div>
      </div>
    </div>`).join('')}

    <div class="grid3" style="margin-bottom:14px">
      <div class="card" style="padding:14px 10px">
        <div style="font-size:10px;color:#f87171;font-weight:600;margin-bottom:4px">SPENT</div>
        <div style="font-size:17px;font-weight:700;color:#fca5a5;font-family:'Space Grotesk',sans-serif">${fmt(spent)}</div>
        <div style="font-size:10px;color:#555;margin-top:2px">${txns.filter(t=>t.type==='debit').length} txns</div>
      </div>
      <div class="card" style="padding:14px 10px">
        <div style="font-size:10px;color:#4ade80;font-weight:600;margin-bottom:4px">RECEIVED</div>
        <div style="font-size:17px;font-weight:700;color:#86efac;font-family:'Space Grotesk',sans-serif">${fmt(received)}</div>
        <div style="font-size:10px;color:#555;margin-top:2px">${txns.filter(t=>t.type==='credit').length} txns</div>
      </div>
      <div class="card" style="padding:14px 10px;cursor:pointer" onclick="navigate('cashback')">
        <div style="font-size:10px;color:#fbbf24;font-weight:600;margin-bottom:4px">CASHBACK</div>
        <div style="font-size:17px;font-weight:700;color:#fde68a;font-family:'Space Grotesk',sans-serif">${fmt(cbTotal)}</div>
        <div style="font-size:10px;color:#555;margin-top:2px">${cbs.length} rewards</div>
      </div>
    </div>

    <div class="card" style="padding:16px;margin-bottom:14px">
      <div class="row">
        <div style="font-size:12px;color:#888;font-weight:600">NET SAVINGS</div>
        <div style="font-size:20px;font-weight:700;color:${net>=0?'#86efac':'#fca5a5'};font-family:'Space Grotesk',sans-serif">${net>=0?'+':''}${fmt(net)}</div>
      </div>
      <div class="progress-bar" style="height:5px;margin-top:12px">
        <div class="progress-fill" style="width:${Math.min(100,spent/(spent+received||1)*100)}%;background:linear-gradient(90deg,#7C3AED,#f87171)"></div>
      </div>
      <div class="row" style="margin-top:5px;font-size:10px;color:#555">

      const warn = budget && spent>budget*0.8 && !over;
      return `
      <div class="card" style="padding:16px;margin-bottom:10px">
        <div class="row" style="margin-bottom:${budget?10:0}px">
          <div class="gap8">
            <span style="font-size:22px">${CAT_ICONS[cat]}</span>

            </div>
          </div>
          <div class="gap8">
            ${over?'<span class="badge" style="background:rgba(239,68,68,0.2);color:#fca5a5">Over!</span>':''}
            ${warn?'<span class="badge" style="background:rgba(234,179,8,0.2);color:#fde68a">⚠️</span>':''}
            ${budget?`<span style="font-size:13px;font-weight:600;color:${over?'#fca5a5':'#a78bfa'}">${fmt(budget)}</span>`:''}

            ${budget?`<button onclick="removeBudget('${cat}')" style="background:rgba(239,68,68,0.15);border:none;border-radius:8px;padding:5px 8px;color:#fca5a5;font-size:12px;cursor:pointer">✕</button>`:''}
          </div>
        </div>
        ${state.editBudgetCat===cat?`
        <div style="display:flex;gap:8px;margin-top:10px">
          <input type="number" inputmode="decimal" value="${state.budgetEditVal}" placeholder="Budget ₹" oninput="state.budgetEditVal=this.value" style="flex:1" />
          <button class="btn btn-primary btn-sm" onclick="saveBudget('${cat}')">Save</button>
          <button class="btn btn-outline btn-sm" onclick="state.editBudgetCat=null;render()">✕</button>
        </div>`:''}
        ${budget>0?`
        <div style="margin-top:${state.editBudgetCat===cat?10:0}px">
          <div class="progress-bar" style="height:5px"><div class="progress-fill" style="width:${pct}%;background:${over?'#ef4444':warn?'#eab308':CAT_COLORS[cat]||'#7C3AED'}"></div></div>
          <div class="row" style="margin-top:5px;font-size:10px;color:#555">
            <span>${fmt(spent)} used</span><span>${fmt(Math.max(0,budget-spent))} left</span>
          </div>
        </div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

    <div class="card" style="padding:16px;margin-bottom:16px">
      <div style="font-size:14px;font-weight:600;margin-bottom:10px">🗑️ Clear All Data</div>
      <button class="btn" style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;font-size:14px" onclick="if(confirm('Delete ALL transactions and cashbacks? This cannot be undone.')){state.transactions=[];state.cashbacks=[];state.budgets={};save();render();showToast('All data cleared','warn')}">Clear Everything</button>
    </div>

    <div style="text-align:center;color:#333;font-size:11px;padding-bottom:10px">Built with Claude AI · Data stored on your device</div>
  </div>`;
}

function exportCSV() {
  const rows = [['Date','Type','Amount','Merchant','Category','Source','Note']];
  state.transactions.forEach(t => rows.push([new Date(t.createdAt).toLocaleDateString('en-IN'),t.type,t.amount,t.merchant||'',t.category,t.source||'',t.note||'']));
  state.cashbacks.forEach(c => rows.push([new Date(c.createdAt).toLocaleDateString('en-IN'),'cashback',c.amount,c.source,'Cashback','cashback',c.note||'']));
  const csv = rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = 'upi-tracker.csv';
  a.click();
  showToast('📥 CSV downloaded!');
}

// ─── MAIN RENDER ────────────────────────────────────────
function render() {
  const container = document.getElementById('screen-container');
  const screens = {
    dashboard: renderDashboard,
    add: renderAdd,
    cashback: renderCashback,
    transactions: renderTransactions,
    budget: renderBudget,
    settings: renderSettings,
  };
  const fn = screens[state.screen] || renderDashboard;
  container.innerHTML = fn();
}

// ─── SERVICE WORKER ─────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

render();

// Show API key status in settings
document.addEventListener('click', () => {
  setTimeout(() => {
    const el = document.getElementById('keyStatus');
    if (el) {
      const k = localStorage.getItem('anthropic_key');
      el.innerHTML = k ? '<span style="color:#4ade80">✅ Key saved — UPI parsing ready</span>' : '<span style="color:#f87171">⚠️ No key saved yet</span>';
    }
  }, 100);
});
</script>
